  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      // Initialize Scroll Animations
      useEffect(() => {
        if (window.AOS) {
          window.AOS.init({
            duration: 600, 
            once: true,
            offset: 50,    
          });
        }
      }, []);

      // Scroll Detection
      const [isScrolled, setIsScrolled] = useState(false);
      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      // Countdown Timer
      const calculateTimeLeft = () => {
        const diff = +new Date("2026-09-10T12:05:00") - +new Date();
        return diff > 0 ? {
          Days: Math.floor(diff / (1000 * 60 * 60 * 24)),
          Hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
          Minutes: Math.floor((diff / 1000 / 60) % 60),
          Seconds: Math.floor((diff / 1000) % 60)
        } : {};
      };

      const [timeLeft, setTimeLeft] = useState(calculateTimeLeft());
      useEffect(() => {
        const timer = setTimeout(() => setTimeLeft(calculateTimeLeft()), 1000);
        return () => clearTimeout(timer);
      });

      // Gallery Carousel & Lightbox
      const [currentImg, setCurrentImg] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [lightboxImg, setLightboxImg] = useState(null);
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      const galleryImages = [
        "assets/gallery/photo1.jpg",
        "assets/gallery/photo2.jpg",
        "assets/gallery/photo3.jpg",
        "assets/gallery/photo4.jpg",
        "assets/gallery/photo5.jpg",
        "assets/gallery/photo6.jpg"
      ];

      const nextImg = () => setCurrentImg((prev) => (prev + 1) % galleryImages.length);
      const prevImg = () => setCurrentImg((prev) => (prev - 1 + galleryImages.length) % galleryImages.length);

      useEffect(() => {
        if (isPaused || lightboxImg) return; 
        const interval = setInterval(() => {
          nextImg();
        }, 3000); 
        return () => clearInterval(interval);
      }, [isPaused, lightboxImg, currentImg]);

      const handleStart = (clientX) => {
        touchStartX.current = clientX;
        touchEndX.current = clientX; 
        setIsPaused(true);
      };

      const handleMove = (clientX) => {
        touchEndX.current = clientX;
      };

      const handleEnd = () => {
        const diffX = touchStartX.current - touchEndX.current;
        if (diffX > 40) {
          nextImg(); 
        } else if (diffX < -40) {
          prevImg(); 
        }
        setTimeout(() => setIsPaused(false), 4000); 
      };

      const generateCalLink = (title, dates, details, location) => {
        return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dates}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(location)}`;
      };

      return (
        <div className="overflow-x-hidden relative bg-[#fffaf0]">
          
          {/* Floating Oval Back-to-Top AR Button */}
          <a

            className={`fixed right-4 md:right-8 z-50 flex flex-col items-center justify-center border border-[#c9963c] bg-[#43151d] text-[#c9963c] rounded-[2rem] w-12 h-16 md:w-14 md:h-20 shadow-2xl transition-all duration-500 hover:bg-[#c9963c] hover:text-[#43151d] hover:scale-110 ${isScrolled ? 'bottom-6 md:bottom-8 opacity-100 translate-y-0' : 'bottom-0 opacity-0 translate-y-10 pointer-events-none'}`}
            aria-label="Back to top"
          >
            <span className="text-sm md:text-lg font-bold mb-0.5">↑</span>
            <div className="monogram text-xl md:text-2xl leading-none tracking-wider pr-1">

          </a>

          <header className={`fixed top-0 w-full flex justify-between items-center px-4 md:px-8 z-50 transition-all duration-500 ${isScrolled ? 'bg-[#43151d]/40 backdrop-blur-md shadow-sm py-3' : 'bg-gradient-to-b from-[#43151d]/70 to-transparent py-5'}`}>

              <span className="monogram text-2xl md:text-3xl leading-none pr-1 mt-1">AR</span>
            </div>

              <a href="#couple" className="hover:text-[#c9963c] transition">Couple</a>
              <a href="#events" className="hover:text-[#c9963c] transition">Events</a>
              <a href="#gallery" className="hover:text-[#c9963c] transition">Gallery</a>
              <a href="#wishes" className="hover:text-[#c9963c] transition">Wishes</a>
            </nav>
          </header>

          {/* Hero Section */}
          <section className="relative min-h-[90vh] md:h-screen w-full flex items-center pt-20 pb-12 bg-[#43151d] overflow-hidden">
            <img src="assets/images/hero.jpg" alt="Couple" className="absolute inset-0 w-full h-full object-cover object-center z-0" />
            
            <div className="absolute inset-0 bg-gradient-to-r from-[#2a1a1c]/95 via-[#432329]/60 to-transparent z-10"></div>
            <div className="absolute inset-0 bg-gradient-to-t from-[#fffaf0] via-transparent to-transparent z-10"></div>
            
            <div className="relative z-20 text-white w-full max-w-3xl px-6 md:px-12 drop-shadow-lg mt-12 md:mt-24" data-aos="fade-right">

              <p className="text-lg md:text-xl font-bold text-white/90 mt-8 mb-10 drop-shadow-md">Thursday, 10 September 2026</p>
              
              <div className="flex flex-col sm:flex-row gap-4">
                <a href="#events" className="text-center bg-[#c9963c] text-[#2a241d] px-8 py-3.5 rounded-full font-bold shadow-lg hover:bg-amber-500 transition">View Events</a>
                <a href="#wishes" className="text-center border-2 border-[#43151d] text-[#43151d] bg-transparent backdrop-blur-sm px-8 py-3.5 rounded-full font-bold shadow-lg hover:bg-[#43151d] hover:text-white transition">Leave a Wish</a>
              </div>

          </section>

          {/* Invitation Section */}
          <section id="invitation" className="py-20 md:py-28 px-4 md:px-6 text-center max-w-4xl mx-auto flex flex-col items-center" data-aos="fade-up">
            <div className="w-full border-t border-b border-[#c9963c] py-12 md:py-16">
              <h2 className="serif text-3xl md:text-4xl text-[#2a241d] mb-4">Together with our families,</h2>
              <p className="text-gray-600 text-sm md:text-base font-medium mb-12 px-4">
                we joyfully invite you to share in our happiness and celebrate the wedding of
              </p>
              
              {/* FIXED ORPHAN LETTERS */}
              <div className="serif text-4xl md:text-5xl text-[#6f1f2d] space-y-6 mb-12">
                <span className="block">Dr. Abhishek&nbsp;S</span>

                <span className="block">Dr. Reshma&nbsp;R</span>
              </div>
              
              <div className="mt-12 mb-4">

                  View Detailed Events

            </div>
          </section>

          {/* Bride & Groom Section */}
          <section id="couple" className="py-16 md:py-24 px-6 bg-[#f4eadf]">
            <div className="max-w-5xl mx-auto flex flex-col md:flex-row gap-10 md:gap-16 items-center">
              <div className="w-full md:w-2/5" data-aos="fade-right">
                <div className="border border-[#c9963c]/40 p-2 rounded-xl bg-[#f7ead8] shadow-xl relative">
                  <div className="absolute inset-4 border border-white/60 rounded-lg pointer-events-none"></div>
                  <img src="assets/images/hero.jpg" alt="Couple Portrait" className="w-full aspect-[4/5] object-cover object-center rounded-lg shadow-inner" />
                </div>
              </div>
              
              <div className="w-full md:w-3/5" data-aos="fade-left">
                <p className="text-[#6f1f2d] uppercase tracking-[0.15em] font-bold text-xs md:text-sm mb-4 text-center md:text-left">Bride & Groom</p>
                <h2 className="serif text-4xl md:text-5xl mb-10 text-[#2a241d] text-center md:text-left">Two families, one celebration.</h2>
                
                <div className="grid sm:grid-cols-2 gap-6">
                  <div className="bg-[#fffaf0]/90 p-6 rounded-xl shadow-md border border-[#c9963c]/20" data-aos="fade-up" data-aos-delay="50">
                    <p className="text-[#c9963c] uppercase tracking-widest font-bold text-[10px] mb-3">Groom</p>
                    <h3 className="serif text-2xl text-[#6f1f2d] mb-2">Dr. Abhishek S</h3>
                    <p className="text-gray-600 text-xs mb-4">S/O Mr. Sasankan N & Mrs. Valsamma TV</p>

          {/* Events Section & Maroon Timer Blocks */}

            <div className="max-w-5xl mx-auto">
              
              <div className="text-center mb-16" data-aos="fade-up">
                <p className="text-[#6f1f2d] uppercase tracking-widest font-bold text-xs md:text-sm mb-4">Wedding Details</p>
                <h2 className="serif text-4xl md:text-5xl text-[#2a241d]">Please join us for the ceremonies.</h2>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                
                {/* Event 1 */}
                <div className="md:col-span-2 bg-white p-6 md:p-10 rounded-2xl shadow-xl border border-[#c9963c]/20 flex flex-col md:flex-row md:items-center justify-between gap-8 relative overflow-hidden" data-aos="fade-up">
                  <div className="flex-1 z-10">
                    <p className="text-[#6f1f2d] uppercase tracking-widest font-bold text-xs md:text-sm mb-3">💍 Wedding Ceremony</p>
                    <h3 className="serif text-3xl md:text-4xl text-[#245b4a] mb-6">Thursday, 10 September 2026</h3>
                    <div className="grid grid-cols-2 gap-4 md:gap-6 border-t border-gray-100 pt-6">
                      <div>
                        <p className="text-[#c9963c] text-[10px] md:text-xs font-bold uppercase tracking-widest mb-2">Muhurtham</p>
                        <p className="text-gray-800 font-bold text-sm md:text-base">12:05 PM – 12:45 PM</p>
                      </div>
                      <div>
                        <p className="text-[#c9963c] text-[10px] md:text-xs font-bold uppercase tracking-widest mb-2">Venue</p>
                        <p className="text-gray-800 font-bold text-sm md:text-base">C. Keshavan Memorial Townhall<br/>Kollam</p>
                      </div>
                    </div>
                  </div>
                  <div className="flex flex-col gap-3 min-w-full md:min-w-[200px] z-10">
                    <a href="https://maps.app.goo.gl/PXmx8jJxTGmBuw176?g_st=ac" target="_blank" className="text-center border-2 border-[#6f1f2d] text-[#6f1f2d] px-6 py-3 rounded-xl font-bold hover:bg-[#6f1f2d] hover:text-white transition whitespace-nowrap text-xs md:text-sm">📍 Get Directions</a>
                    <a href={generateCalLink("Dr. Abhishek & Dr. Reshma Wedding", "20260910T063500Z/20260910T071500Z", "Join us for our wedding ceremony!", "C. Keshavan Memorial Townhall, Kollam")} target="_blank" className="text-center bg-[#c9963c] text-white px-6 py-3 rounded-xl font-bold hover:bg-amber-500 shadow-md transition whitespace-nowrap text-xs md:text-sm">📅 Add to Calendar</a>
                  </div>
                </div>

                {/* Event 2 */}
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-[#c9963c]/20 flex flex-col justify-between" data-aos="fade-up" data-aos-delay="50">
                  <div>
                    <p className="text-[#6f1f2d] uppercase tracking-widest font-bold text-xs md:text-sm mb-1">🌸 Wedding Eve Reception</p>
                    <p className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-6">(Bride's Place)</p>
                    <h3 className="serif text-2xl text-[#245b4a] mb-6">Wednesday, 9 Sep 2026</h3>
                    <div className="border-t border-gray-100 pt-4 mb-8">
                      <p className="text-[#c9963c] text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1">Time</p>
                      <p className="text-gray-800 font-bold text-sm mb-4">5:00 PM – 8:30 PM</p>
                      <p className="text-[#c9963c] text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1">Venue</p>
                      <p className="text-gray-800 font-bold text-sm">Q Vintage Resort<br/>Kollam</p>
                    </div>
                  </div>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <a href="https://maps.app.goo.gl/wVk9rSe6oCD9xhjr8" target="_blank" className="flex-1 text-center border-2 border-[#6f1f2d] text-[#6f1f2d] py-2.5 rounded-lg font-bold hover:bg-[#6f1f2d] hover:text-white transition text-xs">📍 Directions</a>
                    <a href={generateCalLink("Dr. Abhishek & Dr. Reshma Wedding Eve", "20260909T113000Z/20260909T150000Z", "Wedding Eve Celebration.", "Q Vintage Resort, Kollam")} target="_blank" className="flex-1 text-center bg-[#c9963c] text-white py-2.5 rounded-lg font-bold hover:bg-amber-500 transition text-xs">📅 Add to Calendar</a>
                  </div>
                </div>

                {/* Event 3 */}
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-[#c9963c]/20 flex flex-col justify-between" data-aos="fade-up" data-aos-delay="150">
                  <div>
                    <p className="text-[#6f1f2d] uppercase tracking-widest font-bold text-xs md:text-sm mb-1">🎉 Wedding Reception</p>
                    <p className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-6">(Groom's Place)</p>
                    <h3 className="serif text-2xl text-[#245b4a] mb-6">Saturday, 12 Sep 2026</h3>
                    <div className="border-t border-gray-100 pt-4 mb-8">
                      <p className="text-[#c9963c] text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1">Time</p>
                      <p className="text-gray-800 font-bold text-sm mb-4">5:00 PM – 9:00 PM</p>
                      <p className="text-[#c9963c] text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1">Venue</p>
                      <p className="text-gray-800 font-bold text-sm">Sadhri Convention Centre<br/>Muthukulam</p>
                    </div>
                  </div>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <a href="https://maps.app.goo.gl/huEgrY73XDY7QA4F9?g_st=ac" target="_blank" className="flex-1 text-center border-2 border-[#6f1f2d] text-[#6f1f2d] py-2.5 rounded-lg font-bold hover:bg-[#6f1f2d] hover:text-white transition text-xs">📍 Directions</a>
                    <a href={generateCalLink("Dr. Abhishek & Dr. Reshma Reception", "20260912T113000Z/20260912T153000Z", "Wedding Reception.", "Sadhri Convention Centre, Muthukulam")} target="_blank" className="flex-1 text-center bg-[#c9963c] text-white py-2.5 rounded-lg font-bold hover:bg-amber-500 transition text-xs">📅 Add to Calendar</a>
                  </div>
                </div>
              </div>

              {/* Maroon Timer Blocks */}
              <div className="mt-20 md:mt-24 text-center" data-aos="fade-up">
                <p className="serif text-3xl md:text-4xl text-[#6f1f2d] mb-8 font-semibold">Counting Down To Our Forever</p>
                <div className="flex flex-nowrap items-center justify-center gap-2 sm:gap-4 md:gap-6 max-w-full px-2">
                  {Object.keys(timeLeft).length > 0 ? (
                    Object.entries(timeLeft).map(([unit, val]) => (
                      <div key={unit} className="bg-[#43151d] w-[4.5rem] h-20 sm:w-20 sm:h-24 md:w-32 md:h-36 flex flex-col items-center justify-center rounded-xl md:rounded-2xl shadow-[0_8px_25px_rgba(67,21,29,0.3)] border border-[#c9963c]/40 shrink-0">
                        <span className="block text-2xl sm:text-3xl md:text-5xl font-bold text-[#f1d38a] mb-1">{val}</span>

                  ) : (

          {/* Interactive 3D Gallery Carousel */}
          <section id="gallery" className="py-20 md:py-24 px-4 bg-[#fffaf0] overflow-hidden">
            <div className="max-w-5xl mx-auto text-center" data-aos="fade-up">
              <p className="text-[#6f1f2d] uppercase tracking-widest font-bold text-xs md:text-sm mb-4">📸 Our Moments</p>
              <h2 className="serif text-4xl md:text-5xl mb-12 text-[#2a241d]">A few memories before we begin forever.</h2>
              
              <div 
                className="relative h-[300px] sm:h-[400px] md:h-[550px] w-full flex items-center justify-center mt-8 mb-8 cursor-grab active:cursor-grabbing no-select"
                style={{ touchAction: 'pan-y' }}
                onTouchStart={(e) => handleStart(e.targetTouches[0].clientX)}
                onTouchMove={(e) => handleMove(e.targetTouches[0].clientX)}
                onTouchEnd={handleEnd}
                onMouseDown={(e) => handleStart(e.clientX)}
                onMouseMove={(e) => { if (e.buttons === 1) handleMove(e.clientX); }}
                onMouseUp={handleEnd}
                onMouseLeave={() => { setIsPaused(false); handleEnd(); }}
                onMouseEnter={() => setIsPaused(true)}
              >
                {galleryImages.map((src, index) => {
                  const diff = (index - currentImg + 6) % 6;
                  
                  // FIXED MOBILE LAG: Removed "all", added will-change, isolated transform and opacity for GPU
                  let positionStyle = { 
                    transform: 'translateX(-50%) scale(0.4)', 
                    opacity: 0, zIndex: 0, pointerEvents: 'none',
                    willChange: 'transform, opacity',
                    transition: 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease'
                  };

                  if (diff === 0) {
                    positionStyle = { 
                      transform: 'translateX(-50%) scale(1)', 
                      opacity: 1, zIndex: 30, pointerEvents: 'auto', cursor: 'zoom-in',
                      boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.4)',
                      willChange: 'transform, opacity',
                      transition: 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease'
                    };
                  } else if (diff === 1) {
                    positionStyle = { 
                      transform: 'translateX(10%) scale(0.75)', 
                      opacity: 0.6, zIndex: 20, pointerEvents: 'auto', cursor: 'pointer',
                      willChange: 'transform, opacity',
                      transition: 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease'
                    };
                  } else if (diff === 5) {
                    positionStyle = { 
                      transform: 'translateX(-110%) scale(0.75)', 
                      opacity: 0.6, zIndex: 20, pointerEvents: 'auto', cursor: 'pointer',
                      willChange: 'transform, opacity',
                      transition: 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease'
                    };
                  }

                  return (
                    <div 
                      key={index} 
                      className="absolute top-0 left-1/2 w-[80%] sm:w-[60%] md:w-[75%] max-w-[320px] md:max-w-[400px] aspect-[4/5] rounded-2xl overflow-hidden"
                      style={positionStyle}
                      onClick={(e) => {
                        if (Math.abs(touchStartX.current - touchEndX.current) > 10) {
                          e.preventDefault();
                          return;
                        }
                        if (diff === 1) nextImg();
                        else if (diff === 5) prevImg();
                        else if (diff === 0) setLightboxImg(src); 
                      }}
                    >
                      <img src={src} alt={`Gallery ${index + 1}`} draggable="false" className="w-full h-full object-cover rounded-2xl pointer-events-none no-select" />
                      {diff !== 0 && <div className="absolute inset-0 bg-black/20 rounded-2xl pointer-events-none"></div>}
                    </div>
                  );
                })}
              </div>

              <div className="flex justify-center gap-2 md:gap-3 mt-4">
                {galleryImages.map((_, idx) => (
                  <div key={idx} onClick={() => setCurrentImg(idx)} className={`h-1.5 md:h-2 rounded-full cursor-pointer transition-all duration-500 ${currentImg === idx ? 'w-6 md:w-8 bg-[#c9963c]' : 'w-2 bg-[#c9963c]/40'}`}></div>
                ))}
              </div>
            </div>
          </section>

          {/* NEW Integrated Wishes Section (Form Only) */}
          <section id="wishes" className="py-20 md:py-24 px-6 bg-[#43151d] text-[#fffaf0] text-center" data-aos="fade-up">
            <div className="max-w-3xl mx-auto">
              
              {/* FIXED WISHES TITLE (Option B) */}
              <p className="text-[#f1d38a] uppercase tracking-widest font-bold text-xs md:text-sm mb-4">💌 Wedding Wishes</p>
              <h2 className="serif text-4xl md:text-5xl mb-6">Send Your Love & Blessings</h2>
              <p className="text-sm md:text-lg opacity-80 mb-12 leading-relaxed px-4">
                Your heartfelt wishes will make our celebration even more special.
              </p>
              
              <div className="bg-[#fffaf0] rounded-xl shadow-2xl p-8 md:p-10 border border-[#c9963c]/30">
                
                {/* NETLIFY FORM INTEGRATION */}
                <form 
                  name="wedding-wishes" 
                  method="POST" 
                  data-netlify="true" 
                  className="flex flex-col gap-6 text-left"
                >
                  {/* Required hidden input for Netlify forms */}
                  <input type="hidden" name="form-name" value="wedding-wishes" />

                  <div>
                    <label className="block text-[#c9963c] text-xs font-bold uppercase tracking-widest mb-2">Your Name</label>
                    <input 
                      type="text" 
                      name="name" 
                      required 
                      className="w-full bg-[#f7ead8] border border-[#c9963c]/40 rounded-lg p-4 text-[#2a241d] font-semibold focus:outline-none focus:border-[#6f1f2d] focus:ring-2 focus:ring-[#6f1f2d]/50 transition" 
                      placeholder="e.g. Rahul & Priya" 
                    />
                  </div>

                  <div>
                    <label className="block text-[#c9963c] text-xs font-bold uppercase tracking-widest mb-2">Your Wish</label>
                    <textarea 
                      name="wish" 
                      required 
                      rows="5" 
                      className="w-full bg-[#f7ead8] border border-[#c9963c]/40 rounded-lg p-4 text-[#2a241d] font-semibold focus:outline-none focus:border-[#6f1f2d] focus:ring-2 focus:ring-[#6f1f2d]/50 transition resize-y" 
                      placeholder="Write your heartfelt message here..."
                    ></textarea>
                  </div>

                  <button 
                    type="submit" 
                    className="w-full bg-[#6f1f2d] text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:bg-[#c9963c] hover:text-[#2a241d] transition-all duration-300 shadow-md mt-4"
                  >
                    Send Wish
                  </button>
                </form>

              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-[#1f1916] text-[#fffaf0] text-center py-12 md:py-16 px-6">
            <h3 className="serif text-3xl md:text-4xl text-[#f1d38a] mb-6" data-aos="fade-up">Thank You</h3>
            <p className="mb-8 md:mb-10 text-sm md:text-lg opacity-80 max-w-md mx-auto" data-aos="fade-up" data-aos-delay="50">Your love, blessings and presence mean more to us than words can express.</p>
            <p className="serif text-lg md:text-xl" data-aos="fade-up" data-aos-delay="150">
              With all our love,<br/>
              <span className="monogram text-4xl md:text-5xl text-[#f1d38a] mt-4 block">Kannan & Ammu</span>
            </p>
          </footer>

          {/* Lightbox Overlay */}
          {lightboxImg && (
            <div 
              className="fixed inset-0 z-[100] bg-[#1f1916]/95 flex items-center justify-center p-4 cursor-pointer backdrop-blur-sm"
              onClick={() => setLightboxImg(null)}
            >
              <span className="absolute top-6 right-6 text-[#f1d38a] text-4xl font-bold hover:scale-110 transition">&times;</span>
              <img src={lightboxImg} className="max-w-full max-h-[90vh] object-contain rounded-lg border border-[#c9963c]/40 shadow-2xl" alt="Enlarged view" />
            </div>
          )}
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
